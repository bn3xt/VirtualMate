<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>VirtualMate</title>
    <script>try{const saved=localStorage.getItem("virtualmate-theme");document.documentElement.dataset.theme=saved==="dark"||(!saved&&matchMedia("(prefers-color-scheme: dark)").matches)?"dark":"light"}catch{document.documentElement.dataset.theme="light"}</script>
    <link rel="stylesheet" href="/assets/app.css?v=virtualmate-1" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/assets/app.js?v=virtualmate-1"></script>
  </body>
</html>
